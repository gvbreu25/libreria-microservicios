spring.application.name=ms-gateway
server.port=8090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.routes[0].id=ms-usuarios
spring.cloud.gateway.routes[0].uri=lb://ms-usuarios
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/usuarios/**

spring.cloud.gateway.routes[1].id=ms-libros
spring.cloud.gateway.routes[1].uri=lb://ms-libros
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/libros/**

spring.cloud.gateway.routes[2].id=ms-categorias
spring.cloud.gateway.routes[2].uri=lb://ms-categorias
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/categorias/**

spring.cloud.gateway.routes[3].id=ms-inventario
spring.cloud.gateway.routes[3].uri=lb://ms-inventario
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/inventario/**

spring.cloud.gateway.routes[4].id=ms-carrito
spring.cloud.gateway.routes[4].uri=lb://ms-carrito
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/carrito/**

spring.cloud.gateway.routes[5].id=ms-pedidos
spring.cloud.gateway.routes[5].uri=lb://ms-pedidos
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/pedidos/**

spring.cloud.gateway.routes[6].id=ms-pagos
spring.cloud.gateway.routes[6].uri=lb://ms-pagos
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/pagos/**

spring.cloud.gateway.routes[7].id=ms-resenas
spring.cloud.gateway.routes[7].uri=lb://ms-resenas
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/resenas/**

logging.level.root=INFO
logging.level.ms_gateway=DEBUG
logging.file.name=logs/ms-gateway.log